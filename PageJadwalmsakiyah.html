<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Imsakiyah - Ramadhan 1447 H</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-green: #2d5a27;
            --gold-ramadan: #c5a059;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header.card-header-custom {
            background-color: var(--primary-green);
            color: white;
            border-radius: 0 0 20px 20px;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .card-main {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            background: white;
            padding: 2rem;
            margin-top: 20px;
        }

        .nav-link {
            transition: color 0.3s ease;
        }

        .nav-link:hover {
            color: var(--gold-ramadan) !important;
        }

        /* Biar navbar nempel di atas saat scroll */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        /* Pengaturan khusus untuk layar HP (max-width: 576px) */
        @media (max-width: 576px) {
            .card-main {
                padding: 1rem;
                /* Padding lebih kecil di HP */
                margin-top: 10px;
            }

            header.card-header-custom h1 {
                font-size: 1.5rem;
                /* Ukuran font judul lebih kecil di HP */
            }
        }
    </style>
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark shadow-sm"
            style="background-color: var(--primary-green); border-bottom: 1px solid rgba(197, 160, 89, 0.3);">
            <div class="container">
                <a class="navbar-brand fw-bold" href="index.html" style="color: var(--gold-ramadan);">🌙 Ramadhan
                    1447</a>

                <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="PageRamadhanPortal.html">Beranda</a></li>
                        <li class="nav-item"><a class="nav-link" href="DoaSahurdanBuka.html">Doa</a></li>
                        <li class="nav-item"><a class="nav-link active fw-bold" href="PageJadwalmsakiyah.html"
                                style="color: var(--gold-ramadan) !important;">Jadwal</a></li>
                        <li class="nav-item"><a class="nav-link" href="PageKalkulatorZakat.html">Zakat</a></li>
                        <li class="nav-item"><a class="nav-link" href="DzikirHarian.html">Dzikir</a></li>
                        <li class="nav-item"><a class="nav-link" href="TodolistRamadhan.html">Todo</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <div class="card border-0 text-white shadow-sm"
            style="background-color: var(--primary-green); border-radius: 0 0 30px 30px; padding: 40px 0; text-align: center; margin-bottom: 30px;">
            <div class="container">
                <h1 class="mb-0">Jadwal Imsakiyah</h1>
                <p class="mt-2 opacity-75">Panduan jadwal imsakiyah harian di bulan suci</p>
            </div>
        </div>
    </header>

    <main class="container my-4">
        <div class="card-main">
            <div class="row mb-4">
                <div class="col-md-8">
                    <label class="form-label fw-bold">Pilih Kota / Kabupaten:</label>
                    <select id="citySelect" class="form-select">
                        <option value="">-- Memuat daftar kota... --</option>
                    </select>
                </div>
            </div>

            <div id="statusArea"></div>

            <div class="table-responsive">
                <table class="table table-striped table-hover d-none" id="scheduleTable">
                    <thead class="table-success">
                        <tr>
                            <th>Tanggal</th>
                            <th>Imsak</th>
                            <th>Subuh</th>
                            <th>Dzuhur</th>
                            <th>Ashar</th>
                            <th>Maghrib</th>
                            <th>Isya</th>
                        </tr>
                    </thead>
                    <tbody id="scheduleBody"></tbody>
                </table>
            </div>
        </div>
    </main>


    <footer class="bg-white text-center py-3 mt-auto border-top">
        <div class="container">
            <p class="text-success fw-bold mb-1">Ramadhan 1447 H</p>
            <small class="text-secondary">&copy; 2026 Web Ramadhan.</small>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const citySelect = document.getElementById('citySelect');
        const scheduleTable = document.getElementById('scheduleTable');
        const scheduleBody = document.getElementById('scheduleBody');
        const statusArea = document.getElementById('statusArea');

        // 1. Fungsi Load Kota (Harus DIPANGGIL di paling bawah)
        const loadCities = async () => {
            try {
                const response = await fetch('https://api.myquran.com/v2/sholat/kota/semua');
                const { data } = await response.json();
                citySelect.innerHTML = '<option value="">-- Pilih Kota --</option>' +
                    data.map(city => `<option value="${city.id}">${city.lokasi}</option>`).join('');
            } catch (err) {
                statusArea.innerHTML = `<div class="alert alert-danger">Gagal memuat kota.</div>`;
            }
        };

        // 2. Fungsi Render Tabel (Logika untuk membuat baris HTML)
        const renderTable = (jadwal, today) => {
            scheduleBody.innerHTML = jadwal.map(item => {
                // Ambil angka tanggal (misal "09" dari "Senin, 09/03/2026")
                const dateNum = parseInt(item.tanggal.split(',')[1].split('/')[0]);
                const isToday = dateNum === today ? 'table-warning fw-bold' : '';

                return `
                <tr class="${isToday}">
                    <td>${item.tanggal}</td>
                    <td>${item.imsak}</td>
                    <td>${item.subuh}</td>
                    <td>${item.dzuhur}</td>
                    <td>${item.ashar}</td>
                    <td>${item.maghrib}</td>
                    <td>${item.isya}</td>
                </tr>
            `;
            }).join('');
        };

        // 3. Fungsi Get Jadwal
        const getJadwal = async (cityId) => {
            const now = new Date();
            const y = now.getFullYear();
            const m = now.getMonth() + 1;
            const today = now.getDate();

            // 1. TAMPILKAN LOADING (Sesuai instruksi: Spinner + Pesan)
            statusArea.innerHTML = `
        <div class="text-center my-4">
            <div class="spinner-border text-success" role="status"></div>
            <p class="mt-2 fw-bold text-secondary anim-blink">Sedang memuat data...</p>
        </div>
    `;

            // Sembunyikan tabel lama saat loading agar bersih
            scheduleTable.classList.add('d-none');

            try {
                const response = await fetch(`https://api.myquran.com/v2/sholat/jadwal/${cityId}/${y}/${m}`);
                const { data } = await response.json();

                if (data && data.jadwal) {
                    renderTable(data.jadwal, today);

                    // 2. BERHASIL: Hapus pesan loading & munculkan tabel
                    statusArea.innerHTML = '';
                    scheduleTable.classList.remove('d-none');
                }
            } catch (err) {
                // 3. ERROR: Tampilkan pesan gagal (Poin 4 di instruksi)
                statusArea.innerHTML = `
            <div class="alert alert-danger text-center mt-3" role="alert">
                <i class="bi bi-exclamation-triangle-fill"></i> Gagal memuat data. Periksa koneksi internet Anda.
            </div>
        `;
                console.error("Fetch Error:", err);
            }
        };

        // --- EKSEKUSI DI SINI ---

        // Jalankan loadCities saat halaman pertama kali dibuka
        loadCities();

        // Pasang "pendengar" agar saat dropdown berubah, jadwal dipanggil
        citySelect.addEventListener('change', (e) => {
            if (e.target.value) {
                getJadwal(e.target.value);
            } else {
                scheduleTable.classList.add('d-none');
            }
        });
    </script>
</body>

</html>
