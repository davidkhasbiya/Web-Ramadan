<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Zakat - Ramadhan 1447 H</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-green: #2d5a27;
            --gold-ramadan: #c5a059;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header.card-header-custom {
            background-color: var(--primary-green);
            color: white;
            border-radius: 0 0 20px 20px;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .card-main {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            background: white;
            padding: 2rem;
            margin-top: 20px;
        }

        .hidden {
            display: none;
        }

        .btn-hitung {
            background-color: var(--primary-green);
            color: white;
            font-weight: 600;
            border-radius: 10px;
        }

        .btn-hitung:hover {
            background-color: #1e3d1a;
            color: white;
        }

        #hasil-box {
            border-left: 5px solid var(--gold-ramadan);
            background-color: #fffdf5;
        }

        .nav-link {
            transition: color 0.3s ease;
        }

        .nav-link:hover {
            color: var(--gold-ramadan) !important;
        }

        /* Biar navbar nempel di atas saat scroll */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
        }


        @media (max-width: 576px) {
            .card-main {
                padding: 1.5rem;
                margin-top: 0;
                border-radius: 0;
            }

            header.card-header-custom h1 {
                font-size: 1.5rem;
            }

            .btn-hitung {
                padding: 12px;
            }
        }
    </style>
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark shadow-sm"
            style="background-color: var(--primary-green); border-bottom: 1px solid rgba(197, 160, 89, 0.3);">
            <div class="container">
                <a class="navbar-brand fw-bold" href="index.html" style="color: var(--gold-ramadan);">🌙 Ramadhan
                    1447</a>

                <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="PageRamadhanPortal.html">Beranda</a></li>
                        <li class="nav-item"><a class="nav-link" href="DoaSahurdanBuka.html">Doa</a></li>
                        <li class="nav-item"><a class="nav-link" href="PageJadwalmsakiyah.html">Jadwal</a></li>
                        <li class="nav-item"><a class="nav-link active fw-bold" href="PageKalkulatorZakat.html"
                                style="color: var(--gold-ramadan) !important;">Zakat</a></li>
                        <li class="nav-item"><a class="nav-link" href="DzikirHarian.html">Dzikir</a></li>
                        <li class="nav-item"><a class="nav-link" href="TodolistRamadhan.html">Todo</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <div class="card border-0 text-white shadow-sm"
            style="background-color: var(--primary-green); border-radius: 0 0 30px 30px; padding: 40px 0; text-align: center; margin-bottom: 30px;">
            <div class="container">
                <h1 class="mb-0">Kalkulator Zakat</h1>
                <p class="mt-2 opacity-75">Kalkulator Zakat yang simple dan mudah</p>
            </div>
        </div>
    </header>

    <main class="container my-4">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card card-main">

                    <div class="mb-4">
                        <label class="form-label fw-bold">Pilih Jenis Zakat</label>
                        <select id="pilihZakat" class="form-select" onchange="toggleForm()">
                            <option value="penghasilan">Zakat Penghasilan</option>
                            <option value="emas">Zakat Emas</option>
                        </select>
                    </div>

                    <hr>

                    <div class="mb-3">
                        <label class="form-label">Harga Emas Saat Ini (per gram)</label>
                        <input id="InputHargaEmas" type="number" class="form-control" placeholder="Contoh: 1200000">
                    </div>

                    <div id="formPenghasilan">
                        <div class="mb-3">
                            <label class="form-label">Gaji Bulanan</label>
                            <input id="InputGaji" type="number" class="form-control" placeholder="0">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Penghasilan Lainnya</label>
                            <input id="InputPenghasilan" type="number" class="form-control" placeholder="0">
                        </div>
                    </div>

                    <div id="formEmas" class="hidden">
                        <div class="mb-3">
                            <label class="form-label">Total Berat Emas (Gram)</label>
                            <input id="InputTotalEmas" type="number" class="form-control" placeholder="0">
                        </div>
                    </div>

                    <button class="btn btn-hitung w-100 py-3 mt-3" onclick="prosesHitung()">Hitung Zakat</button>

                    <div id="hasil" class="mt-4 p-3 rounded hidden">
                    </div>

                </div>
            </div>
        </div>
    </main>

    <footer class="bg-white text-center py-3 mt-auto border-top">
        <div class="container">
            <p class="text-success fw-bold mb-1">Ramadhan 1447 H</p>
            <small class="text-secondary">&copy; 2026 Web Ramadhan.</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Mengambil elemen input (Sesuai gaya JS kamu)
        const inputGaji = document.getElementById("InputGaji");
        const inputPenghasilan = document.getElementById("InputPenghasilan");
        const inputEmas = document.getElementById("InputTotalEmas");
        const inputHargaEmas = document.getElementById("InputHargaEmas");
        const displayHasil = document.getElementById("hasil");

        function toggleForm() {
            const pilihan = document.getElementById("pilihZakat").value;
            const formP = document.getElementById("formPenghasilan");
            const formE = document.getElementById("formEmas");

            if (pilihan === "penghasilan") {
                formP.classList.remove("hidden");
                formE.classList.add("hidden");
            } else {
                formP.classList.add("hidden");
                formE.classList.remove("hidden");
            }
            displayHasil.classList.add("hidden");
        }

        function prosesHitung() {
            const pilihan = document.getElementById("pilihZakat").value;

            if (!inputHargaEmas.value) {
                alert("Masukkan harga emas terlebih dahulu!");
                return;
            }

            if (pilihan === "penghasilan") {
                ZakatPenghasilan();
            } else {
                ZakatEmas();
            }
        }

        function ZakatPenghasilan() {
            const gaji = parseFloat(inputGaji.value) || 0;
            const penghasilanLain = parseFloat(inputPenghasilan.value) || 0;
            const hargaEmas = parseFloat(inputHargaEmas.value);

            const total = gaji + penghasilanLain;
            const nisab = hargaEmas * 85;
            const zakat = (2.5 / 100) * total;

            tampilkanHasil(total, nisab, zakat);
        }

        function ZakatEmas() {
            const gram = parseFloat(inputEmas.value) || 0;
            const hargaEmas = parseFloat(inputHargaEmas.value);

            const nilaiEmas = gram * hargaEmas;
            const nisab = hargaEmas * 85;
            const zakat = (2.5 / 100) * nilaiEmas;

            tampilkanHasil(nilaiEmas, nisab, zakat);
        }

        function tampilkanHasil(harta, nisab, jumlahZakat) {
            displayHasil.classList.remove("hidden");
            displayHasil.id = "hasil-box";

            if (harta >= nisab) {
                displayHasil.innerHTML = `
                    <h5 class="text-success fw-bold">Wajib Zakat</h5>
                    <p class="mb-1">Total Harta: <b>Rp ${harta.toLocaleString()}</b></p>
                    <p class="mb-1">Nisab: Rp ${nisab.toLocaleString()}</p>
                    <hr>
                    <p class="mb-0">Zakat yang harus dibayar:</p>
                    <h4 class="fw-bold text-dark">Rp ${jumlahZakat.toLocaleString()}</h4>
                `;
            } else {
                displayHasil.innerHTML = `
                    <h5 class="text-warning fw-bold">Belum Wajib Zakat</h5>
                    <p class="mb-0 text-muted">Total harta Anda belum mencapai nisab (Rp ${nisab.toLocaleString()}).</p>
                `;
            }
        }
    </script>
</body>

</html>
