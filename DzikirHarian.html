<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dzikir Harian - Ramadhan 1447 H</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <style>
        :root {
            --primary-green: #2d5a27;
            --gold-ramadan: #c5a059;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header.card {
            background-color: var(--primary-green);
            color: white;
            border: none;
            border-radius: 0 0 20px 20px;
            padding: 20px 0;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            background: white;
            padding: 2rem;
        }

        .display-angka {
            font-size: 6rem;
            font-weight: 700;
            color: var(--primary-green);
            margin: 20px 0;
        }

        .btn-action {
            transition: all 0.2s ease;
            font-weight: 600;
        }

        #notif-target {
            display: none;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .nav-link {
            transition: color 0.3s ease;
        }

        .nav-link:hover {
            color: var(--gold-ramadan) !important;
        }

        /* Biar navbar nempel di atas saat scroll */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        @media (max-width: 576px) {
            .container {
                padding-left: 10px;
                padding-right: 10px;
            }

            .display-1 {
                font-size: 5rem;
            }

            .btn-lg-mobile {
                padding: 15px 30px;
                width: 100%;
                margin-bottom: 10px;
            }
        }
    </style>
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark shadow-sm"
            style="background-color: var(--primary-green); border-bottom: 1px solid rgba(197, 160, 89, 0.3);">
            <div class="container">
                <a class="navbar-brand fw-bold" href="index.html" style="color: var(--gold-ramadan);">🌙 Ramadhan
                    1447</a>

                <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Beranda</a></li>
                        <li class="nav-item"><a class="nav-link" href="DoaSahurdanBuka.html">Doa</a></li>
                        <li class="nav-item"><a class="nav-link" href="PageJadwalmsakiyah.html">Jadwal</a></li>
                        <li class="nav-item"><a class="nav-link" href="PageKalkulatorZakat.html">Zakat</a></li>
                        <li class="nav-item"><a class="nav-link active fw-bold" href="DzikirHarian.html"
                                style="color: var(--gold-ramadan) !important;">Dzikir</a></li>
                        <li class="nav-item"><a class="nav-link" href="TodolistRamadhan.html">Todo</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <div class="card border-0 text-white shadow-sm"
            style="background-color: var(--primary-green); border-radius: 0 0 30px 30px; padding: 40px 0; text-align: center; margin-bottom: 30px;">
            <div class="container">
                <h1 class="mb-0">Dzikir Harian</h1>
                <p class="mt-2 opacity-75">Pencatat Dzikir harian di bulan suci</p>
            </div>
        </div>
    </header>
    <main class="container mb-5">
        <section class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card text-center">
                    <div class="mb-4">
                        <label for="input-target" class="form-label text-muted small fw-bold">SET TARGET DZIKIR</label>
                        <div class="input-group">
                            <input type="number" id="input-target" class="form-control text-center"
                                placeholder="Contoh: 33">
                            <button class="btn btn-primary" type="button" id="btn-save"
                                onclick=simpanTarget()>SIMPAN</button>
                        </div>
                        <small id="target-helper" class="text-muted d-block mt-1"></small>
                    </div>
                    <hr>
                    <div class="display-angka" id="display-angka">0</div>
                    <div id="notif-target" class="alert alert-success fw-bold py-2 mb-4">
                        Target Tercapai! Alhamdulillah
                    </div>
                    <div class="d-grid gap-3">
                        <button onclick="tambah()" class="btn btn-success btn-lg btn-action shadow-sm py-3">
                            TAMBAH (+)
                        </button>
                        <button onclick="reset()" class="btn btn-outline-danger btn-action">
                            RESET ULANG
                        </button>
                    </div>
                </div>
        </section>
    </main>

    <footer class="bg-white text-center py-3 mt-auto border-top">
        <div class="container">
            <div class="row">
                <div class="col-12">
                    <p class="text-success fw-bold mb-1">Ramadhan 1447 H</p>
                    <small class="text-secondary">&copy; 2026 Web Ramadhan.</small>
                </div>
            </div>
        </div>
    </footer>

    <script>
        let angka = 0;

        function tambah() {
            const target = document.getElementById("input-target").value;
            const notif = document.getElementById("notif-target");
            if (target === "" || target <= 0) {
                alert("Silahkan masukkan target angka dulu");
                return;
            }
            if (angka < target) {
                angka++;
                updateTampilan();
            }
            if (angka == target) {
                notif.style.display = "block";
            }

        }

        function reset() {
            angka = 0;
            updateTampilan();
            document.getElementById("input-target").value = "";
            document.getElementById("notif-target").style.display = "none";
            const helper = document.getElementById("target-helper");
            if (helper) {
                helper.innerText = "";
            }
        }

        function simpanTarget() {
            const target = document.getElementById("input-target").value;
            const helper = document.getElementById("target-helper");
            if (target > 0) {
                helper.innerText = "Target dikunci: " + target;
                helper.classList.remove("text-muted");
                helper.classList.add("text-success");
                alert("Angka target " + target + " berhasil disimpan!");
            } else {
                alert("Masukkan angka target yang valid (minimal 1)");
            }
        }
    </script>
</body>

</html>
